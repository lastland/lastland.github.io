        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
        <script>
            // Dark mode toggle functionality
            (function() {
                const themeToggle = document.getElementById('theme-toggle');
                const themeToggleMobile = document.getElementById('theme-toggle-mobile');
                const themeIcon = document.getElementById('theme-icon');
                const themeIconMobile = document.getElementById('theme-icon-mobile');
                const html = document.documentElement;
                
                // Get saved theme or default to system preference
                function getTheme() {
                    const saved = localStorage.getItem('theme');
                    if (saved) {
                        return saved;
                    }
                    return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                }
                
                // Update icon helper
                function updateIcons(theme) {
                    const icons = [themeIcon, themeIconMobile].filter(Boolean);
                    const toggles = [themeToggle, themeToggleMobile].filter(Boolean);
                    
                    icons.forEach(icon => {
                        if (theme === 'dark') {
                            icon.classList.remove('bi-moon-stars-fill');
                            icon.classList.add('bi-sun-fill');
                        } else {
                            icon.classList.remove('bi-sun-fill');
                            icon.classList.add('bi-moon-stars-fill');
                        }
                    });
                    
                    toggles.forEach(toggle => {
                        toggle.setAttribute('aria-label', theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
                        toggle.setAttribute('aria-pressed', theme === 'dark' ? 'true' : 'false');
                    });
                }
                
                // Apply theme
                function setTheme(theme) {
                    html.setAttribute('data-theme', theme);
                    localStorage.setItem('theme', theme);
                    updateIcons(theme);
                }
                
                // Toggle theme
                function toggleTheme() {
                    const currentTheme = html.getAttribute('data-theme');
                    const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                    setTheme(newTheme);
                }
                
                // Initialize theme
                const currentTheme = getTheme();
                setTheme(currentTheme);
                
                // Add event listeners
                if (themeToggle) {
                    themeToggle.addEventListener('click', toggleTheme);
                }
                if (themeToggleMobile) {
                    themeToggleMobile.addEventListener('click', toggleTheme);
                }

                // Keep aria-current in sync with Scrollspy/URL hash for screen reader context
                function syncNavCurrent() {
                    const navLinks = document.querySelectorAll('#navbarNav .nav-link');
                    navLinks.forEach(link => {
                        const isActive = link.classList.contains('active');
                        if (isActive) {
                            link.setAttribute('aria-current', 'page');
                        } else {
                            link.removeAttribute('aria-current');
                        }
                    });
                }
                document.body.addEventListener('activate.bs.scrollspy', syncNavCurrent);
                window.addEventListener('hashchange', syncNavCurrent);
                syncNavCurrent();
                
                // Listen for system theme changes
                window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
                    // Only auto-switch if user hasn't manually set a preference
                    if (!localStorage.getItem('theme')) {
                        setTheme(e.matches ? 'dark' : 'light');
                    }
                });
            })();
        </script>
