<article class="course-detail">
    <header class="course-detail-header">
        <div class="course-detail-head-row">
            <h1 class="course-detail-title">$title$</h1>
            <span class="chip"><svg class="icon" aria-hidden="true"><use href="/images/icons.svg#calendar3"/></svg> $term$</span>
        </div>
    </header>

    $if(image)$
    <figure class="course-detail-figure">
        <img src="/images/$image$" alt="$caption$">
        <figcaption>
            $caption$ <br>
            <small>(Image source: <a href="$source$" target="_blank" rel="noopener noreferrer">$source$</a>)</small>
        </figcaption>
    </figure>
    $endif$

    <section class="course-detail-body">
        $body$
    </section>
</article>
