name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  hlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: haskell-actions/hlint-setup@v2
        with:
          version: '3.5'   # match the local hlint so CI and dev agree on hints
      - uses: haskell-actions/hlint-run@v2
        with:
          path: '["site.hs", "src/", "test/"]'
          fail-on: status   # fail on any hint — the bar is "No hints" (see CLAUDE.md)

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: haskell-actions/setup@v2
        with:
          enable-stack: true
          stack-version: 'latest'
          stack-no-global: true   # stack installs the resolver's GHC itself
      # Two caches per the upstream actions/cache Haskell-Stack recipe:
      # ~/.stack holds the stack-installed GHC + compiled deps (multi-GB,
      # changes only with the resolver/deps), .stack-work churns with source.
      # The first uncached run is slow (GHC + pandoc); later runs restore.
      - uses: actions/cache@v6
        with:
          path: ~/.stack
          key: ${{ runner.os }}-stack-global-${{ hashFiles('stack.yaml', 'stack.yaml.lock', 'site.cabal') }}
          restore-keys: ${{ runner.os }}-stack-global-
      - uses: actions/cache@v6
        with:
          path: .stack-work
          key: ${{ runner.os }}-stack-work-${{ hashFiles('stack.yaml', 'stack.yaml.lock', 'site.cabal', '**/*.hs') }}
          restore-keys: ${{ runner.os }}-stack-work-
      - run: stack test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true   # mysteries/ feeds docs/mysteries
      - uses: haskell-actions/setup@v2
        with:
          enable-stack: true
          stack-version: 'latest'
          stack-no-global: true
      # Same cache keys as the test job: both jobs share the restored
      # dependency store; whichever saves first wins, the other is a no-op.
      - uses: actions/cache@v6
        with:
          path: ~/.stack
          key: ${{ runner.os }}-stack-global-${{ hashFiles('stack.yaml', 'stack.yaml.lock', 'site.cabal') }}
          restore-keys: ${{ runner.os }}-stack-global-
      - uses: actions/cache@v6
        with:
          path: .stack-work
          key: ${{ runner.os }}-stack-work-${{ hashFiles('stack.yaml', 'stack.yaml.lock', 'site.cabal', '**/*.hs') }}
          restore-keys: ${{ runner.os }}-stack-work-
      - run: stack build
      - run: stack exec site build
      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs

  # Publishes the build job's github-pages artifact; no checkout needed.
  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: [test, build]
    runs-on: ubuntu-latest
    permissions:
      pages: write      # authorize the Pages deployment
      id-token: write   # OIDC token deploy-pages authenticates with
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - uses: actions/configure-pages@v6
      - id: deployment
        uses: actions/deploy-pages@v5
