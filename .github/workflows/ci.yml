name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  hlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: haskell-actions/hlint-setup@v2
        with:
          version: '3.5'   # match the local hlint so CI and dev agree on hints
      - uses: haskell-actions/hlint-run@v2
        with:
          path: '["site.hs", "src/", "test/"]'
          fail-on: status   # the bar is "No hints" (see CLAUDE.md)

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: haskell-actions/setup@v2
        with:
          enable-stack: true
          stack-version: 'latest'
      # stack installs the resolver's GHC into ~/.stack; cache it together
      # with the compiled dependencies (pandoc is heavy — the first uncached
      # run is slow, later runs restore from here).
      - uses: actions/cache@v4
        with:
          path: |
            ~/.stack
            .stack-work
          key: ${{ runner.os }}-stack-${{ hashFiles('stack.yaml', 'stack.yaml.lock', 'site.cabal') }}
          restore-keys: ${{ runner.os }}-stack-
      - run: stack test
